[tool.ruff]
target-version = "py312"
line-length = 120

[tool.ruff.lint]
# Google-aligned rule selection:
# E/F/W: pycodestyle errors, pyflakes, warnings (core)
# I: isort (import sorting — Google style guide)
# B: flake8-bugbear (common pitfalls)
# UP: pyupgrade (modern Python idioms)
# SIM: flake8-simplify (simplifiable constructs)
# Current: E, F, W (matching existing CI). Enable incrementally:
# Phase 1 (now): E, F, W
# Phase 2 (next): + I (import sorting)
# Phase 3: + B, UP, SIM
select = ["E", "F", "W"]
ignore = [
    "E501",   # Line length — handled by formatter
    "B008",   # Function call in default argument — FastAPI Depends() pattern
    "UP007",  # X | None syntax — keep Optional for compatibility
]

[tool.ruff.lint.isort]
known-first-party = ["app"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.pytest.ini_options]
markers = [
    "small: Fast unit tests, no I/O (< 60s)",
    "medium: Integration tests, localhost only (< 300s)",
    "large: End-to-end tests, full system (< 900s)",
]
