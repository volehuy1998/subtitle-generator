[tool.ruff]
target-version = "py312"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "W", "I", "S602", "S604", "S608", "TID253"]
ignore = ["E501"]

[tool.ruff.lint.flake8-tidy-imports]
banned-module-level-imports = ["torch", "faster_whisper", "ctranslate2", "numpy"]

[tool.ruff.lint.isort]
known-first-party = ["app"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.pytest.ini_options]
markers = [
    "small: Fast unit tests, no I/O (< 60s)",
    "medium: Integration tests, localhost only (< 300s)",
    "large: End-to-end tests, full system (< 900s)",
]
