services:
  # PostgreSQL database (always available, no profile needed)
  # Start DB only:  docker compose up postgres -d
  # Start all (CPU): docker compose --profile cpu up -d
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=subtitle
      - POSTGRES_PASSWORD=subtitle
      - POSTGRES_DB=subtitle_generator
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U subtitle -d subtitle_generator"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # CPU-only mode
  subtitle-generator:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "443:8000"
      - "80:8080"
    volumes:
      - ./uploads:/app/uploads
      - ./outputs:/app/outputs
      - ./logs:/app/logs
      - /etc/letsencrypt/live/openlabs.club/fullchain.pem:/certs/fullchain.pem:ro
      - /etc/letsencrypt/live/openlabs.club/privkey.pem:/certs/privkey.pem:ro
    environment:
      - ENVIRONMENT=prod
      - DATABASE_URL=postgresql+asyncpg://subtitle:subtitle@postgres:5432/subtitle_generator
      - API_KEYS=${API_KEYS:-}
      - HF_TOKEN=${HF_TOKEN:-}
      - FILE_RETENTION_HOURS=${FILE_RETENTION_HOURS:-24}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - cpu

  # GPU mode (requires NVIDIA Container Toolkit)
  subtitle-generator-gpu:
    build:
      context: .
      dockerfile: Dockerfile.gpu
    ports:
      - "443:8000"
      - "80:8080"
    volumes:
      - ./uploads:/app/uploads
      - ./outputs:/app/outputs
      - ./logs:/app/logs
      - /etc/letsencrypt/live/openlabs.club/fullchain.pem:/certs/fullchain.pem:ro
      - /etc/letsencrypt/live/openlabs.club/privkey.pem:/certs/privkey.pem:ro
    environment:
      - ENVIRONMENT=prod
      - DATABASE_URL=postgresql+asyncpg://subtitle:subtitle@postgres:5432/subtitle_generator
      - API_KEYS=${API_KEYS:-}
      - HF_TOKEN=${HF_TOKEN:-}
      - FILE_RETENTION_HOURS=${FILE_RETENTION_HOURS:-24}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    profiles:
      - gpu

volumes:
  pgdata:
