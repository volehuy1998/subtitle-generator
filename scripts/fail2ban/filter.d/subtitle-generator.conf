[Definition]
# Match HTTP 4xx/5xx errors in uvicorn logs
failregex = ^.*"(?:GET|POST|PUT|DELETE|PATCH) .+ HTTP/[\d.]+" (?:4[0-9]{2}|5[0-9]{2}) .*$
            ^.*\[auth\] Authentication failed.*ip=<HOST>.*$
            ^.*BRUTE FORCE.*ip=<HOST>.*$
ignoreregex = ^.*"GET /health.*$
              ^.*"GET /favicon.*$
