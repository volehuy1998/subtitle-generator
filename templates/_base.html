<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SubForge{% endblock %}</title>
    <meta name="theme-color" content="#863bff">
    {% block meta %}{% endblock %}
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        /* Scrollbar — always-visible track prevents layout shift */
        html { overflow-y: scroll; scrollbar-width: thin; scrollbar-color: #CBD5E1 transparent; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 9999px; }
        ::-webkit-scrollbar-thumb:hover { background: #94A3B8; }

        :root {
            --bg: #F1F5F9; --surface: #FFFFFF; --surface-2: #F8FAFC;
            --border: #E2E8F0; --border-2: #CBD5E1;
            --primary: #863bff; --primary-hover: #7326f0; --primary-light: #f3eeff; --primary-mid: #ddd6fe;
            --success: #10B981; --success-light: #ECFDF5; --success-border: #A7F3D0;
            --warning: #F59E0B; --warning-light: #FFFBEB;
            --error: #EF4444; --error-light: #FEF2F2;
            --text: #0F172A; --text-2: #475569; --text-3: #94A3B8;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.06);
            --shadow: 0 1px 3px rgba(0,0,0,0.07), 0 1px 2px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.08), 0 1px 4px rgba(0,0,0,0.04);
            --radius: 16px; --radius-sm: 10px; --radius-xs: 6px;
        }
        html, body { min-height: 100%; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            font-size: 14px;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }
        a { color: var(--primary); text-decoration: none; }
        a:hover { text-decoration: underline; }

        /* ── Header ── */
        .site-header {
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 0 24px;
            height: 54px;
            display: flex;
            align-items: center;
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            box-shadow: 0 1px 0 rgba(0,0,0,0.04), 0 2px 8px rgba(0,0,0,0.04);
        }
        body { padding-top: 54px; }
        .site-header-inner {
            max-width: 1100px;
            margin: 0 auto;
            width: 100%;
            display: flex;
            align-items: center;
        }
        .site-logo {
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            font-size: 0.93rem;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.4px;
            flex-shrink: 0;
            margin-right: 28px;
        }
        .site-logo:hover { text-decoration: none; opacity: 0.85; }
        .site-logo svg { width: 20px; height: 20px; }
        .site-nav {
            display: flex;
            align-items: center;
            gap: 1px;
            flex: 1;
        }
        .site-nav a {
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-2);
            padding: 5px 11px;
            border-radius: var(--radius-xs);
            transition: color 0.12s, background 0.12s;
            letter-spacing: -0.1px;
        }
        .site-nav a:hover { color: var(--text); background: rgba(0,0,0,0.04); text-decoration: none; }
        .site-nav a.active { color: var(--primary); background: var(--primary-light); font-weight: 600; }

        /* ── Page container ── */
        .page-container { max-width: 860px; margin: 0 auto; padding: 40px 24px 80px; }

        /* ── Shared components ── */
        .section { margin-bottom: 28px; }
        .section-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.67rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-3);
            margin-bottom: 12px;
            padding-left: 1px;
        }
        .section-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
        }

        /* ── Footer ── */
        .site-footer {
            border-top: 1px solid var(--border);
            margin-top: 64px;
            padding: 22px 24px;
            text-align: center;
            font-size: 0.73rem;
            color: var(--text-3);
        }
        .site-footer a { color: var(--text-3); }
        .site-footer a:hover { color: var(--primary); text-decoration: none; }

        {% block extra_css %}{% endblock %}
    </style>
</head>
<body>

<header class="site-header">
    <div class="site-header-inner">
        <a href="/" class="site-logo">
            <svg viewBox="0 0 48 46" fill="none" aria-hidden="true">
                <path d="M25.946 44.938c-.664.845-2.021.375-2.021-.698V33.937a2.26 2.26 0 0 0-2.262-2.262H10.287c-.92 0-1.456-1.04-.92-1.788l7.48-10.471c1.07-1.497 0-3.578-1.842-3.578H1.237c-.92 0-1.456-1.04-.92-1.788L10.013.474c.214-.297.556-.474.92-.474h28.894c.92 0 1.456 1.04.92 1.788l-7.48 10.471c-1.07 1.498 0 3.579 1.842 3.579h11.377c.943 0 1.473 1.088.89 1.83L25.947 44.94z" fill="#863bff"/>
            </svg>
            SubForge
        </a>
        <nav class="site-nav">
            <a href="/" {% if active_page == 'home' %}class="active"{% endif %}>App</a>
            <a href="/status" {% if active_page == 'status' %}class="active"{% endif %}>Status</a>
            <a href="/security" {% if active_page == 'security' %}class="active"{% endif %}>Security</a>
            <a href="/about" {% if active_page == 'about' %}class="active"{% endif %}>About</a>
            <a href="/contact" {% if active_page == 'contact' %}class="active"{% endif %}>Contact</a>
        </nav>
    </div>
</header>

<main class="page-container">
    {% block content %}{% endblock %}
</main>

<footer class="site-footer">
    &copy; {% block year %}2026{% endblock %} SubForge &mdash;
    Open-source subtitle generator &mdash;
    <a href="https://github.com/volehuy1998/subtitle-generator" target="_blank" rel="noopener">GitHub</a>
</footer>

</body>
</html>
