<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="10">
    <title>SubForge — Service Unavailable</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #faf9f7;
            color: #292524;
            padding: 1rem;
        }
        .container {
            max-width: 520px;
            width: 100%;
            text-align: center;
        }
        .badge {
            display: inline-block;
            background: #fee2e2;
            color: #991b1b;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            margin-bottom: 1.5rem;
        }
        h1 {
            font-size: 1.75rem;
            font-weight: 700;
            color: #4F46E5;
            margin-bottom: 0.5rem;
        }
        .subtitle {
            font-size: 1rem;
            color: #78716c;
            margin-bottom: 1.5rem;
        }
        .reasons {
            background: #fff;
            border: 1px solid #e7e5e4;
            border-radius: 0.75rem;
            padding: 1rem 1.25rem;
            margin-bottom: 1.5rem;
            text-align: left;
        }
        .reasons h2 {
            font-size: 0.8125rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: #a8a29e;
            margin-bottom: 0.75rem;
        }
        .reasons ul {
            list-style: none;
            padding: 0;
        }
        .reasons li {
            padding: 0.5rem 0;
            border-top: 1px solid #f5f5f4;
            font-size: 0.9375rem;
            color: #44403c;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .reasons li:first-child { border-top: none; }
        .reasons li::before {
            content: '';
            width: 6px;
            height: 6px;
            background: #ef4444;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .actions {
            display: flex;
            gap: 0.75rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            padding: 0.625rem 1.25rem;
            font-size: 0.875rem;
            font-weight: 500;
            border-radius: 0.5rem;
            text-decoration: none;
            cursor: pointer;
            border: none;
            transition: background 0.15s;
        }
        .btn-primary {
            background: #4F46E5;
            color: #fff;
        }
        .btn-primary:hover { background: #4338ca; }
        .btn-secondary {
            background: #f5f5f4;
            color: #44403c;
            border: 1px solid #e7e5e4;
        }
        .btn-secondary:hover { background: #e7e5e4; }
        .footer {
            font-size: 0.75rem;
            color: #a8a29e;
        }
        .footer a {
            color: #4F46E5;
            text-decoration: none;
        }
        .footer a:hover { text-decoration: underline; }

        @media (prefers-color-scheme: dark) {
            body { background: #1c1917; color: #e7e5e4; }
            .badge { background: #450a0a; color: #fca5a5; }
            h1 { color: #818cf8; }
            .subtitle { color: #a8a29e; }
            .reasons { background: #292524; border-color: #44403c; }
            .reasons h2 { color: #78716c; }
            .reasons li { color: #d6d3d1; border-color: #44403c; }
            .btn-primary { background: #6366f1; }
            .btn-primary:hover { background: #818cf8; }
            .btn-secondary { background: #292524; color: #d6d3d1; border-color: #44403c; }
            .btn-secondary:hover { background: #44403c; }
            .footer { color: #78716c; }
            .footer a { color: #818cf8; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="badge">System Critical</div>
        <h1>SubForge</h1>
        <p class="subtitle">Service is temporarily unavailable. All operations are suspended while the system recovers.</p>
        <div class="reasons">
            <h2>Active Issues</h2>
            <ul>
                {{REASONS}}
            </ul>
        </div>
        <div class="actions">
            <button class="btn btn-primary" onclick="location.reload()">Retry Now</button>
            <a class="btn btn-secondary" href="/health">Health Check</a>
            <a class="btn btn-secondary" href="/status">Status Page</a>
        </div>
        <p class="footer">This page auto-refreshes every 10 seconds. &middot; <a href="/health">/health</a> &middot; <a href="/status">/status</a></p>
    </div>
</body>
</html>
