name: Review Gate

# Enforces that every PR receives at least one engineer review comment
# using the mandatory Peer Feedback Format before merge is allowed.
#
# STALE REVIEW POLICY: When new commits are pushed (synchronize event),
# all prior approvals are invalidated. Engineers must re-review after
# every code change. Only comments posted AFTER the latest push count.
#
# Valid review pattern:
#   **[Name] ([Role]) — APPROVE**
#   **[Name] ([Role]) — REQUEST CHANGES**

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created, edited]

permissions:
  contents: read
  pull-requests: read

jobs:
  review-gate:
    name: Engineer Review
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request)
    env:
      GH_TOKEN: ${{ github.token }}
      REPO: ${{ github.repository }}
    steps:
      - name: Determine PR number
        id: pr
        env:
          PR_NUM_FROM_PR: ${{ github.event.pull_request.number }}
          PR_NUM_FROM_ISSUE: ${{ github.event.issue.number }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            echo "number=${PR_NUM_FROM_PR}" >> "$GITHUB_OUTPUT"
          else
            echo "number=${PR_NUM_FROM_ISSUE}" >> "$GITHUB_OUTPUT"
          fi

      - name: Check for valid engineer review
        run: |
          set -euo pipefail

          PR_NUMBER="${{ steps.pr.outputs.number }}"

          echo "::group::Fetching PR data for #${PR_NUMBER}"

          # Get the latest commit timestamp — reviews must be AFTER this
          CUTOFF=$(gh api "repos/${REPO}/pulls/${PR_NUMBER}/commits" \
            --jq 'last | .commit.committer.date' 2>/dev/null || echo "")

          if [ -n "$CUTOFF" ]; then
            echo "  Latest commit: ${CUTOFF}"
            echo "  Reviews must be posted AFTER this timestamp to count."
          else
            echo "  WARNING: Could not determine latest commit date. Counting all reviews."
          fi

          # Write comments JSON to temp files for Python to read
          gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" \
            --paginate 2>/dev/null > /tmp/issue_comments.json || echo "[]" > /tmp/issue_comments.json
          gh api "repos/${REPO}/pulls/${PR_NUMBER}/reviews" \
            --paginate 2>/dev/null > /tmp/pr_reviews.json || echo "[]" > /tmp/pr_reviews.json

          echo "::endgroup::"

          echo ""
          echo "============================================"
          echo "  Engineer Review Gate — PR #${PR_NUMBER}"
          echo "============================================"

          if [ -n "$CUTOFF" ]; then
            echo "  Cutoff: only reviews after ${CUTOFF}"
          fi
          echo ""

          # Use Python to filter comments by timestamp and check patterns
          export REVIEW_CUTOFF="$CUTOFF"
          RESULT=$(python3 -c '
          import json, os, re

          cutoff = os.environ.get("REVIEW_CUTOFF", "")

          engineers = [
              ("Forge", "Senior Backend Engineer"),
              ("Bolt", "Backend Engineer"),
              ("Pixel", "Senior Frontend Engineer"),
              ("Prism", "UI/UX Engineer"),
              ("Scout", "QA Lead"),
              ("Stress", "Performance Engineer"),
              ("Harbor", "DevOps Engineer"),
              ("Anchor", "Infrastructure Engineer"),
              ("Shield", "Security Engineer"),
              ("Quill", "Documentation Engineer"),
              ("Hawk", "Code Reviewer"),
          ]

          # Read comments from temp files
          try:
              with open("/tmp/issue_comments.json") as f:
                  issue_comments = json.load(f)
          except Exception:
              issue_comments = []

          try:
              with open("/tmp/pr_reviews.json") as f:
                  pr_reviews = json.load(f)
          except Exception:
              pr_reviews = []

          # Build list of (body, created_at)
          all_comments = []
          for c in issue_comments:
              all_comments.append((c.get("body", ""), c.get("created_at", "")))
          for r in pr_reviews:
              all_comments.append((r.get("body", ""), r.get("submitted_at", r.get("created_at", ""))))

          # Filter by cutoff
          if cutoff:
              fresh_comments = [body for body, ts in all_comments if ts and ts > cutoff]
              stale_count = len(all_comments) - len(fresh_comments)
          else:
              fresh_comments = [body for body, _ in all_comments]
              stale_count = 0

          approvals = []
          rejections = []

          for name, role in engineers:
              approve_pat = rf"\*\*{re.escape(name)}\s*\({re.escape(role)}\)\s*[\u2014—-]\s*APPROVE\*\*"
              reject_pat = rf"\*\*{re.escape(name)}\s*\({re.escape(role)}\)\s*[\u2014—-]\s*REQUEST CHANGES\*\*"
              for body in fresh_comments:
                  if re.search(approve_pat, body):
                      approvals.append(f"{name} ({role})")
                      break
              for body in fresh_comments:
                  if re.search(reject_pat, body):
                      rejections.append(f"{name} ({role})")
                      break

          result = {
              "approvals": approvals,
              "rejections": rejections,
              "stale_count": stale_count,
              "total_fresh": len(fresh_comments),
              "hawk_approved": any("Hawk" in a for a in approvals),
          }
          print(json.dumps(result))
          ')

          # Parse Python output
          APPROVAL_COUNT=$(echo "$RESULT" | python3 -c "import sys,json; print(len(json.load(sys.stdin)['approvals']))")
          REJECTION_COUNT=$(echo "$RESULT" | python3 -c "import sys,json; print(len(json.load(sys.stdin)['rejections']))")
          STALE_COUNT=$(echo "$RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin)['stale_count'])")
          HAWK_APPROVED=$(echo "$RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin)['hawk_approved'])")

          # Display approvals
          echo "$RESULT" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          for a in d['approvals']:
              print(f'  ✅ {a} — APPROVE')
          for r in d['rejections']:
              print(f'  ❌ {r} — REQUEST CHANGES')
          "

          if [ "$STALE_COUNT" -gt 0 ]; then
            echo ""
            echo "  ⚠️  ${STALE_COUNT} stale review(s) invalidated (posted before latest push)"
          fi

          echo ""
          echo "--------------------------------------------"
          echo "  Fresh approvals: ${APPROVAL_COUNT}"
          echo "  Fresh rejections: ${REJECTION_COUNT}"
          echo "  Stale (invalidated): ${STALE_COUNT}"
          echo "--------------------------------------------"

          # Fail conditions
          if [ "$REJECTION_COUNT" -gt 0 ]; then
            echo ""
            echo "  BLOCKED: ${REJECTION_COUNT} engineer(s) requested changes."
            echo "  Resolve all requested changes before merge."
            echo ""
            echo "============================================"
            exit 1
          fi

          if [ "$APPROVAL_COUNT" -eq 0 ]; then
            echo ""
            echo "  BLOCKED: No fresh engineer review found."
            echo ""
            if [ "$STALE_COUNT" -gt 0 ]; then
              echo "  ${STALE_COUNT} review(s) were posted before the latest push"
              echo "  and have been INVALIDATED. Engineers must re-review"
              echo "  after every code change."
              echo ""
            fi
            echo "  At least one Sentinel engineer must post a review"
            echo "  using the mandatory Peer Feedback Format:"
            echo ""
            echo "    **[Name] ([Role]) — APPROVE**"
            echo "    ### What works well"
            echo "    - [Specific observation]"
            echo "    ### Issues found"
            echo "    - [Severity] [Description]"
            echo "    ### Recommendation"
            echo "    [Approve / Block / Nit-only]"
            echo ""
            echo "  Valid engineers: Forge, Bolt, Pixel, Prism, Scout,"
            echo "  Stress, Harbor, Anchor, Shield, Quill, Hawk"
            echo ""
            echo "============================================"
            exit 1
          fi

          # Hawk warning
          if [ "$HAWK_APPROVED" = "False" ]; then
            echo ""
            echo "  ⚠️  WARNING: Hawk (Code Reviewer) has not reviewed."
            echo "  Per CLAUDE.md, Hawk reviews every PR. This is non-negotiable."
            echo "  Merge is allowed but Hawk review is expected."
            echo ""
          fi

          echo ""
          echo "  PASSED: ${APPROVAL_COUNT} fresh engineer approval(s) found."
          echo "============================================"
