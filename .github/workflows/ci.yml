name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
      - 'CHANGELOG.md'
      - 'CONTRIBUTING.md'
      - 'CLAUDE.md'
      - '.github/PULL_REQUEST_TEMPLATE.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
      - 'CHANGELOG.md'
      - 'CONTRIBUTING.md'
      - 'CLAUDE.md'
      - '.github/PULL_REQUEST_TEMPLATE.md'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Python lint
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check .
      - run: ruff format --check --diff .

      # Frontend lint + type check
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: TypeScript check
        working-directory: frontend
        run: npx tsc -b --noEmit
      - name: ESLint
        working-directory: frontend
        run: npx eslint src/ --max-warnings 0

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6

      # Backend tests
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov
      - name: Run backend tests
        run: pytest tests/ -v --tb=short --cov=app --cov-report=xml
      - name: Upload backend coverage
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: coverage.xml

      # Frontend tests
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Run frontend tests
        working-directory: frontend
        run: npx vitest run --coverage
      - name: Upload frontend coverage
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/

  deploy-validate:
    name: Validate Deploy-Critical Files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate docker-compose CPU profile
        run: docker compose --profile cpu config > /dev/null

      - name: Validate docker-compose newui profile
        run: docker compose --profile newui config > /dev/null

      - name: Validate deploy.sh syntax
        run: bash -n scripts/deploy.sh

      - name: Validate PROD_IMAGE_TAG consistency
        run: |
          # .env.example must declare PROD_IMAGE_TAG
          grep -q '^PROD_IMAGE_TAG=' .env.example || { echo "PROD_IMAGE_TAG missing from .env.example"; exit 1; }
          # docker-compose.yml must reference PROD_IMAGE_TAG
          grep -q 'PROD_IMAGE_TAG' docker-compose.yml || { echo "docker-compose.yml does not reference PROD_IMAGE_TAG"; exit 1; }

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build image
        run: docker build -t subtitle-generator:${{ github.sha }} .
      - name: Test image health
        run: |
          docker run -d --name test-container -p 8000:8000 subtitle-generator:${{ github.sha }}
          sleep 10
          curl -f http://localhost:8000/health || exit 1
          docker stop test-container
