name: Release Notification

on:
  release:
    types: [published]

permissions:
  issues: write

jobs:
  notify:
    name: Create Deployment Checklist
    runs-on: ubuntu-latest
    steps:
      - name: Create deployment issue
        uses: actions/github-script@v9
        with:
          script: |
            const tag = context.payload.release.tag_name;
            const url = context.payload.release.html_url;
            const repo = `${context.repo.owner}/${context.repo.repo}`;
            const image = `ghcr.io/${repo}:${tag.replace(/^v/, '')}`;

            const body = [
              `## Deployment Checklist -- ${tag}`,
              '',
              `**Release:** [${tag}](${url})`,
              `**Docker image:** \`${image}\``,
              '',
              '### Production (openlabs.club)',
              '',
              `- [ ] Pull image: \`docker pull ${image}\``,
              '- [ ] Deploy: `./scripts/deploy-profile.sh cpu --tag`',
              '- [ ] Health check: `curl -sf https://openlabs.club/health`',
              '',
              '### Beta (beta.openlabs.club)',
              '',
              `- [ ] Pull image: \`docker pull ${image}\``,
              '- [ ] Deploy and verify',
              '- [ ] Health check: `curl -sf https://beta.openlabs.club/health`',
              '',
              '### Staging (newui.openlabs.club)',
              '',
              `- [ ] Pull image: \`docker pull ${image}\``,
              '- [ ] Deploy: `./scripts/deploy-profile.sh newui`',
              '- [ ] Health check: `curl -sf https://newui.openlabs.club/health`',
              '',
              '---',
              '_Auto-generated by release notification workflow._',
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Deploy ${tag}`,
              body,
              labels: ['deployment'],
            });
