name: Release Deployment Notification

on:
  release:
    types: [published]

permissions:
  contents: read
  issues: write

jobs:
  notify:
    name: Create Deployment Checklist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract changelog for this release
        id: changelog
        env:
          TAG: ${{ github.event.release.tag_name }}
          RELEASE_URL: ${{ github.event.release.html_url }}
        run: |
          VERSION="${TAG#v}"

          # Extract the section for this version from CHANGELOG.md
          NOTES=$(awk "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)

          if [ -z "$NOTES" ]; then
            NOTES="No changelog entry found for ${VERSION}. See release notes at ${RELEASE_URL}"
          fi

          # Write to file to handle multiline output safely
          printf '%s' "$NOTES" > /tmp/release_notes.txt

      - name: Create deployment checklist issue
        uses: actions/github-script@v7
        env:
          TAG: ${{ github.event.release.tag_name }}
          RELEASE_URL: ${{ github.event.release.html_url }}
          RELEASE_ACTOR: ${{ github.actor }}
          REPO: ${{ github.repository }}
        with:
          script: |
            const fs = require('fs');
            const tag = process.env.TAG;
            const releaseUrl = process.env.RELEASE_URL;
            const actor = process.env.RELEASE_ACTOR;
            const repo = process.env.REPO;
            const version = tag.replace(/^v/, '');
            const releaseNotes = fs.readFileSync('/tmp/release_notes.txt', 'utf8').trim();

            const body = [
              `## Deployment Checklist — ${tag}`,
              '',
              `**Release:** [${tag}](${releaseUrl})`,
              `**Docker image:** \`ghcr.io/${repo}:${version}\``,
              `**Released by:** @${actor}`,
              '',
              '---',
              '',
              '## What changed in this release',
              '',
              releaseNotes || '_No changelog entries for this version._',
              '',
              '---',
              '',
              '## Team Sentinel — pre-release verification',
              '',
              '- [ ] All CI checks passed on the release commit',
              '- [ ] Docker image built and pushed to ghcr.io',
              '- [ ] CHANGELOG.md updated',
              '- [ ] No known regressions in this release',
              '',
              '## Deployment checklist',
              '',
              `- [ ] Pull new Docker image: \`docker pull ghcr.io/${repo}:${version}\``,
              '- [ ] Review changelog entries above for breaking changes',
              '- [ ] Update `.env` / local config if new env vars were added (see `.env.example`)',
              '- [ ] Run `docker compose --profile cpu config` to validate compose file',
              '- [ ] Deploy to staging environment and verify health endpoint',
              '- [ ] Deploy to production environment',
              '- [ ] Confirm `/health` returns `{"status":"healthy"}` post-deploy',
              '- [ ] Check `/status` page shows all systems operational',
              '',
              '---',
              '',
              '_Auto-generated by the release notification workflow. Close when deployment is complete._',
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Deploy ${tag} — deployment checklist`,
              body: body,
              labels: ['deployment', 'sentinel'],
              assignees: [actor],
            });
