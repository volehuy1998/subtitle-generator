name: Secret Scan

# Scans every PR and push to main for secrets, credentials, and sensitive data
# (public IP addresses, tokens, private keys, database URLs).
#
# Skipped for documentation-only changes (.md, docs/, LICENSE, etc.)
# since these files cannot contain executable secrets.
#
# Two complementary scanners:
#   1. TruffleHog   — industry-standard secrets detection (tokens, API keys, certs)
#   2. scan_sensitive.py — custom patterns for public IPs and team-specific data

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - 'CODE_OF_CONDUCT.md'
      - 'SECURITY.md'
      - '.gitignore'
      - '.github/PULL_REQUEST_TEMPLATE.md'
      - '.github/POSTMORTEM_TEMPLATE.md'
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - 'CODE_OF_CONDUCT.md'
      - 'SECURITY.md'
      - '.gitignore'
      - '.github/PULL_REQUEST_TEMPLATE.md'
      - '.github/POSTMORTEM_TEMPLATE.md'

permissions:
  contents: read

jobs:
  trufflehog:
    name: TruffleHog (tokens & credentials)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha || github.event.before || 'HEAD~1' }}
          head: ${{ github.event.pull_request.head.sha || github.sha }}
          extra_args: --only-verified

  sensitive-data:
    name: Sensitive data scan (IPs & custom patterns)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed files
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          PUSH_HEAD_SHA: ${{ github.sha }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            BASE="$PR_BASE_SHA"
            HEAD="$PR_HEAD_SHA"
          else
            BASE="$PUSH_BEFORE_SHA"
            HEAD="$PUSH_HEAD_SHA"
          fi
          # Fallback: if before is all-zeros (first push), compare against parent
          if [ "$BASE" = "0000000000000000000000000000000000000000" ] || [ -z "$BASE" ]; then
            BASE="HEAD~1"
          fi
          git diff --name-only "$BASE" "$HEAD" > /tmp/changed_files.txt 2>/dev/null \
            || git diff --name-only HEAD~1 HEAD > /tmp/changed_files.txt
          echo "Changed files:"
          cat /tmp/changed_files.txt

      - name: Run sensitive data scanner
        run: python scripts/scan_sensitive.py --files /tmp/changed_files.txt
