name: PR Attributes

on:
  pull_request:
    branches: [main]
    types: [opened, edited, labeled, unlabeled, assigned, unassigned, milestoned, demilestoned]

permissions:
  contents: read
  pull-requests: read

jobs:
  validate:
    name: Validate PR attributes
    runs-on: ubuntu-latest
    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}
      REPO: ${{ github.repository }}
    steps:
      - name: Check all 6 mandatory PR attributes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          echo "::group::Fetching PR #${PR_NUMBER} metadata"
          PR_JSON=$(gh pr view "$PR_NUMBER" --repo "$REPO" \
            --json labels,assignees,milestone,projectItems,reviewRequests,body)
          echo "$PR_JSON" | python3 -m json.tool
          echo "::endgroup::"

          ERRORS=()

          # 1. Labels: must have at least one type label AND one priority label
          TYPE_LABELS="bug enhancement documentation deployment performance accessibility"
          PRIORITY_LABELS="P0-critical P1-high P2-medium P3-low"

          LABELS=$(echo "$PR_JSON" | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          for l in d.get('labels', []):
              print(l['name'])
          ")

          HAS_TYPE=false
          for tl in $TYPE_LABELS; do
            if echo "$LABELS" | grep -qx "$tl"; then
              HAS_TYPE=true
              break
            fi
          done

          HAS_PRIORITY=false
          for pl in $PRIORITY_LABELS; do
            if echo "$LABELS" | grep -qx "$pl"; then
              HAS_PRIORITY=true
              break
            fi
          done

          if [ "$HAS_TYPE" = false ]; then
            ERRORS+=("Labels: missing TYPE label (one of: $TYPE_LABELS)")
          fi
          if [ "$HAS_PRIORITY" = false ]; then
            ERRORS+=("Labels: missing PRIORITY label (one of: $PRIORITY_LABELS)")
          fi

          # 2. Assignees: at least one
          ASSIGNEE_COUNT=$(echo "$PR_JSON" | python3 -c "
          import json, sys
          print(len(json.load(sys.stdin).get('assignees', [])))
          ")
          if [ "$ASSIGNEE_COUNT" -eq 0 ]; then
            ERRORS+=("Assignees: no assignee set (assign the PR author)")
          fi

          # 3. Milestone: must be set
          HAS_MILESTONE=$(echo "$PR_JSON" | python3 -c "
          import json, sys
          print('yes' if json.load(sys.stdin).get('milestone') else 'no')
          ")
          if [ "$HAS_MILESTONE" = "no" ]; then
            ERRORS+=("Milestone: not set (assign to the current release milestone)")
          fi

          # 4. Project: must be linked to at least one project
          PROJECT_COUNT=$(echo "$PR_JSON" | python3 -c "
          import json, sys
          print(len(json.load(sys.stdin).get('projectItems', [])))
          ")
          if [ "$PROJECT_COUNT" -eq 0 ]; then
            ERRORS+=("Project: not linked to any project (add to SubForge Roadmap)")
          fi

          # 5. Reviewers: enforced by Engineer Review CI check (review-gate.yml)
          # Native GitHub reviewer assignment is impossible in single-collaborator repos.
          # The Review Gate workflow scans PR comments for engineer APPROVE signatures.
          # This check is intentionally skipped here to avoid permanent CI failure.

          # 6. Linked issue: body must contain 'Closes #N' or 'Fixes #N' or 'Resolves #N'
          HAS_LINKED_ISSUE=$(echo "$PR_JSON" | python3 -c "
          import json, sys, re
          body = json.load(sys.stdin).get('body', '') or ''
          pattern = r'(?:closes|fixes|resolves)\s+#\d+'
          print('yes' if re.search(pattern, body, re.IGNORECASE) else 'no')
          ")
          if [ "$HAS_LINKED_ISSUE" = "no" ]; then
            ERRORS+=("Development: no linked issue found (add 'Closes #N' to PR body)")
          fi

          # Report results
          echo ""
          echo "============================================"
          echo "  PR Attribute Validation Report"
          echo "============================================"

          if [ ${#ERRORS[@]} -eq 0 ]; then
            echo "  All 5 mandatory attributes are set."
            echo "  (Reviewers enforced by Engineer Review CI check)"
            echo "============================================"
            exit 0
          else
            echo "  FAILED: ${#ERRORS[@]} attribute(s) missing"
            echo "============================================"
            echo ""
            echo "CONTRIBUTING.md Section 8 requires these attributes"
            echo "to be set before requesting review:"
            echo ""
            for err in "${ERRORS[@]}"; do
              echo "  - $err"
            done
            echo ""
            echo "See: CONTRIBUTING.md Section 8 -- PR Checklist"
            exit 1
          fi
