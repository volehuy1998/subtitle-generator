# CodeQL security scanning for Python, JavaScript/TypeScript, and GitHub Actions.
# Runs on code changes only -- skipped for documentation-only PRs.
# Weekly scheduled scan covers all code regardless of path filtering.

name: "CodeQL Advanced"

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - 'CODE_OF_CONDUCT.md'
      - 'SECURITY.md'
      - '.gitignore'
      - '.github/PULL_REQUEST_TEMPLATE.md'
      - '.github/POSTMORTEM_TEMPLATE.md'
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - 'CODE_OF_CONDUCT.md'
      - 'SECURITY.md'
      - '.gitignore'
      - '.github/PULL_REQUEST_TEMPLATE.md'
      - '.github/POSTMORTEM_TEMPLATE.md'
  schedule:
    # Weekly full scan (Monday 1:21 PM UTC) -- covers all code regardless of path filtering
    - cron: '21 13 * * 1'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ${{ (matrix.language == 'swift' && 'macos-latest') || 'ubuntu-latest' }}
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
        - language: actions
          build-mode: none
        - language: javascript-typescript
          build-mode: none
        - language: python
          build-mode: none

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: ${{ matrix.language }}
        build-mode: ${{ matrix.build-mode }}

    - name: Run manual build steps
      if: matrix.build-mode == 'manual'
      shell: bash
      run: |
        echo 'Manual build mode not configured.'
        exit 1

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:${{matrix.language}}"
